<div class="form-container">
  <h3 class="form-title">{{ isEditing ? 'Edit Stock Lot' : 'Add New Stock Lot' }}</h3>

  <form @submit.prevent="saveStockLot" class="form-inline">
    <div v-if="isEditing">
      <div>
        <strong>Owner:</strong> {{ stockLot.owner_name }}
      </div>
      <div>
        <strong>Stock:</strong> {{ stockLot.stock_name }} ({{ stockLot.stock_code }})
      </div>
    </div>
    <div v-else>
      <select v-model="formData.ownerId" required class="form-control">
        <option :value="null" disabled>Select Owner</option>
        <option v-for="owner in owners" :key="owner.id" :value="owner.id">
          {{ owner.name }}
        </option>
      </select>
      <select v-model="formData.stockId" required class="form-control">
        <option :value="null" disabled>Select Stock</option>
        <option v-for="stock in stocks" :key="stock.id" :value="stock.id">
          {{ stock.name }} ({{ stock.code }})
        </option>
      </select>
    </div>

    <input
      type="number"
      v-model.number="formData.unit"
      placeholder="Units"
      required
      class="form-control"
    >
    <label>
      <input
        type="checkbox"
        v-model="formData.isNisa"
      >
      NISA
    </label>

    <div class="form-actions">
      <button type="submit" class="btn btn-success">Save</button>
      <button type="button" class="btn btn-secondary" @click="cancel">Cancel</button>
    </div>
  </form>
</div>
