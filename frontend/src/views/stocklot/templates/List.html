<div>
  <div class="page-header">
    <h1 class="page-title">ストックロット一覧</h1>
    <button @click="goToAddStock" class="btn btn-primary">新規登録</button>
  </div>

  <!-- フィルタリングUI -->
  <div class="filter-controls" style="margin-bottom: 1rem;">
    <label for="owner-select">オーナーで絞り込む: </label>
    <select id="owner-select" v-model="selectedOwner">
      <option value="">すべて</option>
      <option v-for="owner in owners" :key="owner" :value="owner">
        {{ owner }}
      </option>
    </select>
    <button @click="clearFilter" v-if="selectedOwner" class="btn btn-secondary btn-sm">クリア</button>
  </div>

  <table v-if="displayStockLots.length > 0" class="common-table">
    <thead>
    <tr>
      <th>日付</th>
      <th>銘柄コード</th>
      <th>オーナー</th>
      <th>銘柄名</th>
      <th>単元数</th>
      <th>購入価格</th>
      <th>現在価格</th>
      <th>手数料</th>
    </tr>
    </thead>
    <tbody>
    <tr v-for="lot in displayStockLots" :key="lot.id">
      <td>{{ lot.date }}</td>
      <td>{{ lot.stock.code }}</td>
      <td>{{ lot.owner_name }}</td>
      <td>{{ lot.stock.name }}</td>
      <td>{{ lot.unit }}</td>
      <td>{{ lot.price }}</td>
      <td>{{ lot.stock.price }}</td>
      <td>{{ lot.fees }}</td>
    </tr>
    </tbody>
  </table>
  <div v-else>
    <p>データはありません</p>
  </div>
</div>
